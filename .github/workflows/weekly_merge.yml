name: Monthly Journal Fetch

on:
  schedule:
    - cron: "0 5 10 * *"   # 每月10日 UTC 05:00
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compute output filename (YYYY-MM)
        id: label
        run: echo "label=$(date -u +%Y-%m)" >> $GITHUB_OUTPUT

      - name: Fetch and classify articles
        run: |
          python main.py --output output/monthly/${{ steps.label.outputs.label }}.xlsx

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/monthly/${{ steps.label.outputs.label }}.xlsx
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "monthly: ${{ steps.label.outputs.label }}"
          git push
