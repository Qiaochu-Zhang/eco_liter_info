name: Weekly Journal Fetch

on:
  schedule:
    - cron: "0 5 * * 5"   # 每周五 UTC 05:00
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compute date range (past 30 days)
        id: dates
        run: |
          FROM=$(date -u -d "30 days ago" +%Y-%m-%d)
          UNTIL=$(date -u +%Y-%m-%d)
          LABEL=$(date -u +%Y-W%V)
          echo "from_date=$FROM" >> $GITHUB_OUTPUT
          echo "until_date=$UNTIL" >> $GITHUB_OUTPUT
          echo "label=$LABEL" >> $GITHUB_OUTPUT

      - name: Fetch and classify articles
        run: |
          python main.py \
            --from-date ${{ steps.dates.outputs.from_date }} \
            --until-date ${{ steps.dates.outputs.until_date }} \
            --output output/weekly/${{ steps.dates.outputs.label }}.xlsx

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/weekly/${{ steps.dates.outputs.label }}.xlsx
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "weekly: ${{ steps.dates.outputs.label }} (${{ steps.dates.outputs.from_date }} ~ ${{ steps.dates.outputs.until_date }})"
          git push
