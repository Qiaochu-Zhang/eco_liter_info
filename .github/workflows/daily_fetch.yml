name: Daily Journal Fetch

on:
  schedule:
    - cron: "0 4 * * *"   # 每天 UTC 04:00
  workflow_dispatch:        # 允许手动触发

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compute date range (UTC yesterday and day before)
        id: dates
        run: |
          FROM=$(date -u -d "2 days ago" +%Y-%m-%d)
          UNTIL=$(date -u -d "1 day ago" +%Y-%m-%d)
          TODAY=$(date -u +%Y-%m-%d)
          echo "from_date=$FROM" >> $GITHUB_OUTPUT
          echo "until_date=$UNTIL" >> $GITHUB_OUTPUT
          echo "today=$TODAY" >> $GITHUB_OUTPUT

      - name: Fetch and classify articles
        run: |
          python main.py \
            --from-date ${{ steps.dates.outputs.from_date }} \
            --until-date ${{ steps.dates.outputs.until_date }} \
            --output output/daily/${{ steps.dates.outputs.today }}.xlsx

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/daily/${{ steps.dates.outputs.today }}.xlsx
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "daily: ${{ steps.dates.outputs.today }} (${{ steps.dates.outputs.from_date }} ~ ${{ steps.dates.outputs.until_date }})"
          git push
